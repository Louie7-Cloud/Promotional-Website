<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOUIE'S CODE - Municipality of Buug</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #4facfe;
            --bg-color: #000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg-color); color: white; overflow: hidden; }

        /* --- CINEMATIC INTRO --- */
        #intro-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1.5s ease;
        }

        .intro-text {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(2rem, 10vw, 5rem);
            letter-spacing: -1px; 
            font-weight: 700;
            text-transform: uppercase;
            opacity: 0;
            animation: textReveal 4s forwards cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes textReveal {
            0% { opacity: 0; transform: scale(0.85); filter: blur(10px); }
            30% { opacity: 1; filter: blur(0px); }
            70% { opacity: 1; transform: scale(1.05); filter: blur(0px); }
            100% { opacity: 0; transform: scale(1.1); filter: blur(15px); }
        }

        /* --- MAIN PAGE CONTENT --- */
        #main-content {
            opacity: 0;
            height: 100vh;
            overflow-y: auto;
            background: url('buug.jpg') no-repeat center center/cover;
            background-attachment: fixed;
            transition: opacity 2s ease;
        }

        .glass-overlay {
            min-height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- STICKY NAV --- */
        nav {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { font-weight: bold; letter-spacing: 2px; text-transform: uppercase; font-size: 1rem; }

        .nav-links { display: flex; list-style: none; gap: 30px; transition: 0.4s ease; }
        .nav-links a { 
            color: #ccc; 
            text-decoration: none; 
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s; 
        }
        .nav-links a:hover { 
            color: white; 
            text-shadow: 0 0 10px white;
            text-decoration: underline;
            text-underline-offset: 8px;
        }

        /* --- HAMBURGER MENU --- */
        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
        }

        .menu-toggle span {
            width: 25px;
            height: 3px;
            background: white;
            border-radius: 5px;
            transition: 0.3s;
        }

        .hero-section {
            text-align: center;
            margin-top: 15vh;
            max-width: 800px;
            padding: 20px;
        }

        h1 { font-size: clamp(2.5rem, 8vw, 4rem); letter-spacing: 5px; margin-bottom: 20px; text-transform: uppercase; }
        p { font-size: clamp(1rem, 3vw, 1.2rem); color: #ddd; line-height: 1.6; }

        /* --- MOBILE VIEW --- */
        @media (max-width: 850px) {
            nav { padding: 20px 5%; }
            .menu-toggle { display: flex; }

            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: rgba(0, 0, 0, 0.95);
                padding: 40px 0;
                text-align: center;
                gap: 25px;
                border-bottom: 1px solid rgba(255,255,255,0.1);
            }

            .nav-links.active { display: flex; }
        }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <div class="intro-text">LOUIE'S CODE</div>
    </div>

    <div id="main-content">
        <div class="glass-overlay">
            <nav>
                <div class="logo">Municipality of Buug</div>
                
                <div class="menu-toggle" id="mobile-toggle">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>

                <ul class="nav-links" id="nav-list">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="officials.html">Officials</a></li>
                    <li><a href="tourism.html">Tourism</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="about.html">About</a></li>
                </ul>
            </nav>

            <div class="hero-section">
                <h1>Welcome</h1>
                <p>To the official digital gateway of the Municipality of Buug. Explore our rich culture, meet our leaders, and witness the natural beauty of our town.</p>
            </div>
        </div>
    </div>

    <script>
        // Intro Animation Logic
        window.addEventListener('load', () => {
            setTimeout(() => {
                const intro = document.getElementById('intro-overlay');
                const content = document.getElementById('main-content');
                intro.style.opacity = '0';
                content.style.opacity = '1';
                document.body.style.overflow = 'auto';
                setTimeout(() => { intro.style.display = 'none'; }, 1500);
            }, 4000); 
        });

        // TOGGLE MENU LOGIC
        const mobileToggle = document.getElementById('mobile-toggle');
        const navList = document.getElementById('nav-list');

        mobileToggle.addEventListener('click', () => {
            navList.classList.toggle('active');
            
            // Optional: Animation para sa Hamburger icon (magiging X)
            const spans = mobileToggle.querySelectorAll('span');
            mobileToggle.classList.toggle('open');
            
            if(mobileToggle.classList.contains('open')) {
                spans[0].style.transform = "rotate(45deg) translate(5px, 6px)";
                spans[1].style.opacity = "0";
                spans[2].style.transform = "rotate(-45deg) translate(5px, -6px)";
            } else {
                spans[0].style.transform = "none";
                spans[1].style.opacity = "1";
                spans[2].style.transform = "none";
            }
        });
    </script>
</body>
</html>
