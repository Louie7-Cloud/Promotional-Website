<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOUIE'S CODE - Municipality of Buug</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #4facfe;
            --bg-color: #000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg-color); color: white; overflow: hidden; }

        /* --- CINEMATIC INTRO --- */
        #intro-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1.5s ease;
        }

        .intro-text {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(2rem, 10vw, 5rem);
            font-weight: 700;
            text-transform: uppercase;
            opacity: 0;
            animation: textReveal 4s forwards cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes textReveal {
            0% { opacity: 0; transform: scale(0.85); filter: blur(10px); }
            30% { opacity: 1; filter: blur(0px); }
            70% { opacity: 1; transform: scale(1.05); filter: blur(0px); }
            100% { opacity: 0; transform: scale(1.1); filter: blur(15px); }
        }

        /* --- MAIN PAGE CONTENT --- */
        #main-content {
            opacity: 0;
            height: 100vh;
            background: url('buug.jpg') no-repeat center center/cover;
            background-attachment: fixed;
            transition: opacity 2s ease;
        }

        .glass-overlay {
            min-height: 100vh;
            background: rgba(0, 0, 0, 1); 
            backdrop-filter: blur(40px);
            display: flex;
            flex-direction: column;
            transition: background 2s ease, backdrop-filter 2s ease;
        }

        /* --- UPDATED: 100% VISIBILITY WITH TOP SHADOW --- */
        .glass-overlay.reveal {
            /* This creates a transparent gray/black shadow at the top fading to transparent */
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 30%);
            backdrop-filter: blur(0px);
        }

        /* --- NAVIGATION --- */
        nav {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 8%;
            opacity: 0;
            transform: translateY(-20px);
            transition: 1s ease 1.5s;
            z-index: 10;
        }

        nav.show { opacity: 1; transform: translateY(0); }

        .logo { font-weight: bold; letter-spacing: 2px; text-transform: uppercase; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .nav-links { display: flex; list-style: none; gap: 30px; }
        .nav-links a { 
            color: white; 
            text-decoration: none; 
            font-size: 0.85rem; 
            text-transform: uppercase; 
            font-weight: 600;
            transition: 0.3s;
        }
        .nav-links a:hover { opacity: 0.7; }

        /* --- HERO SECTION --- */
        .hero-section {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 10%;
            position: relative;
        }

        .hero-wrapper {
            max-width: 800px;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            transition: all 2s cubic-bezier(0.16, 1, 0.3, 1);
            text-align: center;
        }

        .hero-wrapper.shift-left {
            left: 10%;
            top: 50%;
            transform: translate(0, -50%);
            text-align: left;
        }

        h1 { 
            font-size: clamp(3rem, 15vw, 7rem); 
            letter-spacing: 15px; 
            text-transform: uppercase;
            filter: blur(15px);
            opacity: 0;
            transition: all 1.5s ease;
            text-shadow: 0 5px 20px rgba(0,0,0,0.4);
        }

        .hero-wrapper.shift-left h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            letter-spacing: 2px;
            filter: blur(0);
            opacity: 1;
        }

        .hero-content {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1s ease 1.8s, transform 1s ease 1.8s;
        }

        .hero-wrapper.shift-left .hero-content {
            opacity: 1;
            transform: translateY(0);
        }

        p { 
            font-size: 1.2rem; 
            color: white; 
            line-height: 1.6; 
            max-width: 550px; 
            text-shadow: 2px 2px 15px rgba(0,0,0,0.7);
        }

        @media (max-width: 850px) {
            .hero-wrapper.shift-left { left: 5%; width: 90%; }
            .nav-links { display: none; }
            .glass-overlay.reveal { background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.2) 100%); }
        }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <div class="intro-text">LOUIE'S CODE</div>
    </div>

    <div id="main-content">
        <div class="glass-overlay" id="overlay-container">
            <nav id="navbar">
                <div class="logo">Municipality of Buug</div>
                <ul class="nav-links">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Officials</a></li>
                    <li><a href="#">Tourism</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </nav>

            <div class="hero-section">
                <div class="hero-wrapper" id="hero-box">
                    <h1>Welcome</h1>
                    <div class="hero-content">
                        <p>To the official digital gateway of the Municipality of Buug. Explore our rich culture, meet our leaders, and witness the natural beauty of our town.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                const intro = document.getElementById('intro-overlay');
                const content = document.getElementById('main-content');
                const overlay = document.getElementById('overlay-container');
                const hero = document.getElementById('hero-box');
                const nav = document.getElementById('navbar');

                intro.style.opacity = '0';
                content.style.opacity = '1';
                document.body.style.overflow = 'auto';

                setTimeout(() => {
                    overlay.classList.add('reveal'); 
                    hero.classList.add('shift-left');
                    nav.classList.add('show');
                }, 800);

                setTimeout(() => { intro.style.display = 'none'; }, 1500);
            }, 4000); 
        });
    </script>
</body>
</html>
